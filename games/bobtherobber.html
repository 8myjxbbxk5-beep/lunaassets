<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="utf-8" />

  <title>Bob the Robber</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/AndreajnRcm4/b398dl2h74v@9a23fbb2373d743a564873251cbb57736ebc1f73/style.css">

  <script src="https://cdn.jsdelivr.net/gh/u-cvlassrom-y/google@main/ruffle.js"></script>

  <style>

    html, body {

      margin: 0;

      padding: 0;

      width: 100vw;

      height: 100vh;

      background: black;

      overflow: hidden;

    }



    #flash-container {

      position: absolute;

      top: 0;

      left: 0;

      width: 100vw;

      height: 100vh;

    }



    ruffle-player {

      width: 100% !important;

      height: 100% !important;

    }

  </style>

</head>

<body>

  <div id="flash-container"></div>



  <script>

    window.RufflePlayer = window.RufflePlayer || {};

    window.addEventListener("load", () => {

      const ruffle = window.RufflePlayer.newest();

      const player = ruffle.createPlayer();

      player.style.width = "100%";

      player.style.height = "100%";

      document.getElementById("flash-container").appendChild(player);

      player.load("https://cdn.jsdelivr.net/gh/StarRepo444/ClassroomPlayV2@c28ef0cfdccbbfc61a42d9954f14af3115c7398a/games/flash/swf/bob-the-robber.swf");

    });

  </script>

</body>

</html>
