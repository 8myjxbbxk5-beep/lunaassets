<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="utf-8">

  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">

  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Idle Breakout - Made by Kodiqi</title>

  <style>

    * {

      box-sizing: border-box;

      margin: 0;

      padding: 0;

    }

    

    html, body {

      width: 100%;

      height: 100%;

      background: #000000;

      color: #cccccc;

      overflow: hidden;

    }

    

    .game-wrapper {

      width: 100%;

      height: 100%;

      display: flex;

      justify-content: center;

      align-items: center;

      background: #000000;

    }

    

    .gm4html5_div_class {

      position: relative;

      display: flex;

      justify-content: center;

      align-items: center;

    }

    

    canvas#canvas {

      image-rendering: optimizeSpeed;

      image-rendering: -webkit-optimize-contrast;

      image-rendering: crisp-edges;

      image-rendering: pixelated;

      -webkit-interpolation-mode: nearest-neighbor;

      -ms-touch-action: none;

      touch-action: none;

      display: block;

      background: #000000;

    }

    

    :-webkit-full-screen #canvas {

      width: 100%;

      height: 100%;

    }

    

    :-webkit-full-screen {

      width: 100%;

      height: 100%;

    }

    

    div.gm4html5_login {

      padding: 20px;

      position: absolute;

      border: solid 2px #000000;

      background-color: #404040;

      color: #00ff00;

      border-radius: 15px;

      box-shadow: #101010 20px 20px 40px;

      z-index: 1000;

    }

    

    div.gm4html5_cancel_button {

      float: right;

    }

    

    div.gm4html5_login_button {

      float: left;

    }

    

    div.gm4html5_login_header {

      text-align: center;

    }

    

    .loading-text {

      position: absolute;

      top: 50%;

      left: 50%;

      transform: translate(-50%, -50%);

      font-family: Arial, sans-serif;

      font-size: 24px;

      color: #ffffff;

      z-index: 10;

    }

    

    .loading-text.hidden {

      display: none;

    }

  </style>

</head>

<body>

  <div class="game-wrapper">

    <div class="gm4html5_div_class" id="gm4html5_div_id">

      <span class="loading-text" id="loading">Loading game...</span>

      <canvas id="canvas" width="1000" height="768">

        <p>Your browser doesn't support HTML5 canvas.</p>

      </canvas>

    </div>

  </div>



  <script>

    document.addEventListener('DOMContentLoaded', function() {

      var loadingText = document.getElementById('loading');

      

      var script = document.createElement('script');

      script.src = 'https://cdn.jsdelivr.net/gh/bobydob/JSEngine@9b6eab8976a7acc4aee72479af65647693633abc/build/id-br/ibo.js';

      script.onload = function() {

        if (loadingText) {

          loadingText.classList.add('hidden');

        }

        if (typeof GameMaker_Init === 'function') {

          GameMaker_Init();

        }

      };

      script.onerror = function() {

        if (loadingText) {

          loadingText.textContent = 'Failed to load game. Please refresh.';

          loadingText.style.color = '#ff4444';

        }

      };

      document.body.appendChild(script);

    });

  </script>

</body>

</html>
